<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Jason Feng</title>
  <meta name="description" content="Jason Feng">

  <style>
    :root {
      --bg: #f7f8fb;
      --ink: #172033;
      --muted: #667085;
      --line: #d9e0ea;
      --accent: #2457c5;
      --surface: rgba(255, 255, 255, 0.88);
      --shadow: 0 24px 70px rgba(23, 32, 51, 0.10);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      color: var(--ink);
      background:
        linear-gradient(rgba(36, 87, 197, 0.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(36, 87, 197, 0.045) 1px, transparent 1px),
        var(--bg);
      background-size: 32px 32px;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(100% - 40px, 720px);
      padding: clamp(32px, 7vw, 72px);
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: var(--shadow);
      text-align: center;
      backdrop-filter: blur(14px);
    }

    h1 {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(3rem, 10vw, 6rem);
      line-height: 1;
      letter-spacing: 0;
    }

    nav {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 34px;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 0 18px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #ffffff;
      color: var(--ink);
      font-weight: 750;
      text-decoration: none;
      box-shadow: 0 1px 2px rgba(23, 32, 51, 0.06);
    }

    a:first-child {
      border-color: var(--accent);
      background: var(--accent);
      color: #ffffff;
    }

    a:hover {
      transform: translateY(-1px);
    }

    @media (max-width: 520px) {
      main {
        width: min(100% - 28px, 720px);
        padding: 28px;
      }

      nav {
        display: grid;
      }

      a {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>Jason Feng</h1>

    <nav>
      <a href="https://github.com/iamjasonfeng">GitHub Profile</a>
      <a href="https://iamjasonfeng.github.io/RPS-Paper/">RPS Paper</a>
    </nav>
  </main>
</body>
</html>
